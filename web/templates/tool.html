<!DOCTYPE html>
<html>
<head>
    <title>Outlier + GPR Platform</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="brand">GPR Research Platform</span>
    </div>

    <div class="nav-right">
        <a href="/">Home</a>
        <a href="/tool">Tool</a>
        <a href="/methodology">Methodology</a>
        <a href="/creators">Creators</a>
    </div>
</nav>

<div class="page-container">

<h1 class="app-title">ML Outlier + GPR Tool</h1>


<!-- STEP 1 -->
<div id="uploadStep" class="step">

    <h2>Step 1: Upload CSV</h2>

    <div class="card center-card">
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload</button>
    </div>

</div>


<!-- STEP 2 -->
<div id="columnStep" class="step" style="display:none;">

    <h2>Step 2: Column Selection</h2>

    <div class="column-grid">

        <div class="column-card">
            <h3>Control Variables</h3>
            <div id="controlColumns"></div>
        </div>

        <div class="column-card">
            <h3>Block Variable</h3>
            <div id="blockColumn"></div>
        </div>

        <div class="column-card">
            <h3>Output Variable</h3>
            <div id="outputColumn"></div>
        </div>

        <div class="column-card">
            <h3>Log Variables</h3>
            <div id="logColumns"></div>
        </div>

    </div>

    <br>

    <label>Allowed Outlier SD</label>
    <input type="number" id="outlierSD" value="1" step="0.1">

    <div class="nav-buttons">
        <button onclick="prevStep()">Back</button>
        <button onclick="confirmColumns()">Continue</button>
    </div>

</div>


<!-- STEP 3 -->
<div id="trainingStep" class="step" style="display:none;">

    <h2>Step 3: Train GP</h2>

    <div class="card">

        <h3>Kernel Configuration</h3>

        <select id="kernelType">
            <option value="rbf">RBF</option>
            <option value="matern">Matern</option>
            <option value="rq">Rational Quadratic</option>
        </select>

        <br><br>

        <label>
            <input type="checkbox" id="advancedModeToggle">
            Advanced Mode
        </label>

        <div id="kernelAdvancedSection" style="display:none;">

            <label>Length Scale Init</label>
            <input id="lengthScaleInit" type="number" value="1">

            <label>Lower Bound</label>
            <input id="lengthScaleLower" type="number" value="0.01">

            <label>Upper Bound</label>
            <input id="lengthScaleUpper" type="number" value="100">

            <label>Alpha</label>
            <input id="alphaValue" type="number" value="0.000001">

            <label>Restarts</label>
            <input id="restartCount" type="number" value="5">

        </div>

        <hr>

        <h3>Select Block</h3>
        <div id="blockSelection"></div>

        <hr>

        <h3>Plots</h3>

        <button onclick="generatePlot('1d')">1D Plot</button>
        <button onclick="generatePlot('2d')">2D Plot</button>

        <div id="plotArea"></div>

    </div>

    <div class="nav-buttons">
        <button onclick="prevStep()">Back</button>
    </div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
